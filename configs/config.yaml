# =============================================================================
# Vehicle Edge AI — Unsupervised Anomaly Detection
# Configuration file. All tunables live here; code stays clean.
# =============================================================================

project:
  name: vehicle-anomaly-detection
  version: "1.0.0"
  seed: 42

# -----------------------------------------------------------------------------
# DATA
# -----------------------------------------------------------------------------
data:
  # Set mode to "road" to use the ROAD dataset (see README for download steps),
  # or "synthetic" to use the built-in CAN-bus simulator.
  mode: synthetic   # Options: synthetic | road | custom

  # ROAD dataset path (only used when mode=road)
  road_dataset_path: data/road/

  # Synthetic generation parameters
  synthetic:
    n_vehicles: 5            # independent vehicle ECU streams to simulate
    duration_seconds: 7200   # 2-hour drive per vehicle
    sampling_hz: 10          # 10 Hz CAN bus polling
    anomaly_ratio: 0.03      # ~3% of windows flagged anomalous
    noise_std: 0.05          # background sensor noise

  # Sliding-window parameters
  window:
    size: 50          # 5-second window at 10 Hz
    stride: 10        # 1-second stride → heavy overlap for training coverage
    train_split: 0.70
    val_split: 0.15
    # remaining 0.15 → test set

  # Signal channels (names map to simulator columns and ROAD dataset signals)
  channels:
    - engine_rpm
    - vehicle_speed_kmh
    - battery_voltage_v
    - oil_pressure_bar
    - coolant_temp_c
    - throttle_position_pct
    - can_latency_us
    - accel_x_g
    - accel_y_g
    - accel_z_g

# -----------------------------------------------------------------------------
# MODELS
# -----------------------------------------------------------------------------
models:
  lstm_autoencoder:
    input_size: 10          # len(channels)
    hidden_size: 64
    num_layers: 2
    latent_size: 16         # bottleneck — drives compression ratio
    dropout: 0.2
    bidirectional: false    # keep unidirectional for causal, real-time inference

  isolation_forest:
    n_estimators: 200
    max_samples: auto
    contamination: 0.03     # mirrors anomaly_ratio above
    max_features: 1.0
    n_jobs: -1
    random_state: 42

  ensemble:
    # Weighted average of normalised anomaly scores from both models.
    # Adjust weights depending on validation performance; IF tends to excel
    # at point anomalies, LSTM-AE at contextual / temporal patterns.
    lstm_ae_weight: 0.60
    isolation_forest_weight: 0.40
    # Final decision threshold on the combined score (0–1)
    # Calibrated on validation set; override with evaluate.py --calibrate
    decision_threshold: 0.50

# -----------------------------------------------------------------------------
# TRAINING
# -----------------------------------------------------------------------------
training:
  batch_size: 256
  max_epochs: 100
  learning_rate: 1.0e-3
  weight_decay: 1.0e-5
  lr_scheduler:
    type: cosine             # cosine | step | plateau
    min_lr: 1.0e-5
    t_max: 100               # epochs for cosine cycle
  early_stopping:
    patience: 15
    min_delta: 1.0e-5
    monitor: val_loss
  gradient_clip_norm: 1.0
  num_workers: 4
  pin_memory: true
  mixed_precision: false     # set true if CUDA available — not needed on edge

# -----------------------------------------------------------------------------
# EVALUATION
# -----------------------------------------------------------------------------
evaluation:
  # Threshold calibration strategy on validation set
  threshold_strategy: f1_optimal   # f1_optimal | percentile | fixed
  percentile: 95                   # used when strategy=percentile
  metrics:
    - precision
    - recall
    - f1
    - roc_auc
    - average_precision

# -----------------------------------------------------------------------------
# SIGNAL CORRELATOR
# -----------------------------------------------------------------------------
correlator:
  # Cross-channel correlation to identify root-cause sub-system events
  max_lag_seconds: 5        # look-back window for lagged correlation
  correlation_threshold: 0.65
  subsystems:
    powertrain:
      - engine_rpm
      - throttle_position_pct
      - vehicle_speed_kmh
    electrical:
      - battery_voltage_v
      - can_latency_us
    thermal:
      - coolant_temp_c
      - oil_pressure_bar
    dynamics:
      - accel_x_g
      - accel_y_g
      - accel_z_g

# -----------------------------------------------------------------------------
# PATHS
# -----------------------------------------------------------------------------
paths:
  data_cache: artifacts/data_cache/
  checkpoints: artifacts/checkpoints/
  logs: artifacts/logs/
  reports: artifacts/reports/
  tensorboard: artifacts/tensorboard/
