# =============================================================================
# Vehicle Edge AI - Unsupervised Anomaly Detection
# Configuration - aligned with ROAD dataset schema (Signal_1_of_ID…Signal_22_of_ID)
# =============================================================================

project:
  name: vehicle-anomaly-detection
  version: "1.1.0"
  seed: 42

# -----------------------------------------------------------------------------
# DATA
# -----------------------------------------------------------------------------
data:
  # "road"      -> use the downloaded ROAD dataset (see README for path setup)
  # "synthetic" -> use the built-in CAN-bus simulator (same column schema)
  mode: road

  # ROAD dataset root (only used when mode=road)
  # Expected layout:
  #   road_dataset_path/
  #       ambient/          <- all .csv here  ->  TRAIN + VAL (normal)
  #       attacks/          <- all .csv here (any depth) -> TEST (anomalous)
  road_dataset_path: ../data/road/signal_extractions/

  # Synthetic generation (ignored when mode=road)
  synthetic:
    n_ambient_vehicles: 5
    n_attack_vehicles:  2
    duration_ambient_s: 7200
    duration_attack_s:  1800
    sampling_hz: 10
    anomaly_ratio: 0.08
    noise_std: 0.05

  # Val split taken from ambient data only - 80/20
  val_split: 0.20

  # Sliding-window parameters
  window:
    size: 50          # 5-second window at 10 Hz
    stride: 10        # 1-second stride → heavy overlap for training coverage
  # 22 channels - exact names from the ROAD dataset CSVs.
  # Simulator produces the same column names.
  channels:
    - Signal_1_of_ID
    - Signal_2_of_ID
    - Signal_3_of_ID
    - Signal_4_of_ID
    - Signal_5_of_ID
    - Signal_6_of_ID
    - Signal_7_of_ID
    - Signal_8_of_ID
    - Signal_9_of_ID
    - Signal_10_of_ID
    - Signal_11_of_ID
    - Signal_12_of_ID
    - Signal_13_of_ID
    - Signal_14_of_ID
    - Signal_15_of_ID
    - Signal_16_of_ID
    - Signal_17_of_ID
    - Signal_18_of_ID
    - Signal_19_of_ID
    - Signal_20_of_ID
    - Signal_21_of_ID
    - Signal_22_of_ID

# -----------------------------------------------------------------------------
# MODELS
# -----------------------------------------------------------------------------
models:
  lstm_autoencoder:
    input_size: 22
    hidden_size: 96
    num_layers: 2
    latent_size: 24
    dropout: 0.2
    bidirectional: false

  isolation_forest:
    n_estimators: 200
    max_samples: auto
    contamination: 0.05
    max_features: 1.0
    n_jobs: -1
    random_state: 42

  ensemble:
    lstm_ae_weight: 0.60
    isolation_forest_weight: 0.40
    decision_threshold: 0.50

# -----------------------------------------------------------------------------
# TRAINING
# -----------------------------------------------------------------------------
training:
  batch_size: 256
  max_epochs: 100
  learning_rate: 1.0e-3
  weight_decay: 1.0e-5
  lr_scheduler:
    type: cosine
    min_lr: 1.0e-5
    t_max: 100
  early_stopping:
    patience: 15
    min_delta: 1.0e-5
    monitor: val_loss
  gradient_clip_norm: 1.0
  num_workers: 4
  pin_memory: true
  mixed_precision: false

# -----------------------------------------------------------------------------
# EVALUATION
# -----------------------------------------------------------------------------
evaluation:
  threshold_strategy: percentile
  percentile: 95
  metrics:
    - precision
    - recall
    - f1
    - roc_auc
    - average_precision

# -----------------------------------------------------------------------------
# SIGNAL CORRELATOR
# Subsystem groupings use Signal_N_of_ID convention (ROAD-aligned).
# -----------------------------------------------------------------------------
correlator:
  max_lag_seconds: 5
  correlation_threshold: 0.55
  subsystems:
    powertrain:
      - Signal_1_of_ID
      - Signal_2_of_ID
      - Signal_3_of_ID
      - Signal_4_of_ID
      - Signal_5_of_ID
      - Signal_6_of_ID
    electrical:
      - Signal_7_of_ID
      - Signal_8_of_ID
      - Signal_9_of_ID
      - Signal_10_of_ID
    thermal:
      - Signal_11_of_ID
      - Signal_12_of_ID
      - Signal_13_of_ID
      - Signal_14_of_ID
    dynamics:
      - Signal_15_of_ID
      - Signal_16_of_ID
      - Signal_17_of_ID
      - Signal_18_of_ID
      - Signal_19_of_ID
      - Signal_20_of_ID
      - Signal_21_of_ID
      - Signal_22_of_ID

# -----------------------------------------------------------------------------
# PATHS
# -----------------------------------------------------------------------------
paths:
  data_cache: artifacts/data_cache/
  checkpoints: artifacts/checkpoints/
  logs: artifacts/logs/
  reports: artifacts/reports/
  tensorboard: artifacts/tensorboard/
